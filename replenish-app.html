<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Everyworks — Replenish Stock</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root { --blue:#1a73e8; --green:#188038; --red:#d93025; --grey:#5f6368; --bg:#f6f8fa; }
  * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { background:var(--bg); color:#202124; padding-bottom:40px; }
  header { background:#8430ce; color:#fff; padding:14px 16px; font-size:17px; font-weight:600; position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; }
  header .who { font-size:12px; font-weight:400; opacity:.85; }
  .step { max-width:560px; margin:0 auto; padding:16px; }
  .card { background:#fff; border:1px solid #dadce0; border-radius:10px; padding:14px; margin-bottom:12px; }
  h2 { font-size:15px; color:var(--grey); margin-bottom:10px; text-transform:uppercase; letter-spacing:.4px; }
  label { display:block; font-size:13px; color:var(--grey); margin:8px 0 4px; }
  input[type=text], input[type=number], input[type=password], select {
    width:100%; padding:11px 12px; font-size:16px; border:1px solid #dadce0; border-radius:8px; background:#fff;
  }
  input:focus, select:focus { outline:2px solid var(--blue); border-color:var(--blue); }
  button { width:100%; padding:13px; font-size:16px; font-weight:600; border:none; border-radius:8px; cursor:pointer; margin-top:10px; }
  .btn-primary { background:var(--blue); color:#fff; }
  .btn-secondary { background:#e8f0fe; color:var(--blue); }
  .btn-green { background:var(--green); color:#fff; }
  .btn-plain { background:#f1f3f4; color:#202124; }
  button:disabled { opacity:.45; cursor:default; }
  .line { display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid #f0f0f0; }
  .line:last-child { border-bottom:none; }
  .line-info { flex:1; min-width:0; }
  .line-name { font-weight:600; font-size:15px; }
  .line-meta { font-size:13px; color:var(--grey); margin-top:2px; }
  .qty-box { flex-shrink:0; display:flex; align-items:center; gap:4px; }
  .qty-box input { text-align:center; padding:9px 2px; width:46px; }
  .qty-step { width:36px; height:40px; font-size:20px; font-weight:700; border:1px solid #dadce0; border-radius:8px; background:#f1f3f4; color:var(--blue); padding:0; margin:0; flex-shrink:0; }
  .error { color:var(--red); font-size:14px; margin-top:8px; }
  .muted { color:var(--grey); font-size:13px; }
  .result-icon { font-size:52px; text-align:center; margin:18px 0 6px; }
  .result-title { text-align:center; font-size:19px; font-weight:700; margin-bottom:6px; }
  .result-detail { text-align:center; font-size:14px; color:var(--grey); }
  .spinner { border:3px solid #e8eaed; border-top:3px solid var(--blue); border-radius:50%; width:28px; height:28px; animation:spin .8s linear infinite; margin:14px auto; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hidden { display:none; }
  .van-banner { background:#f3e8fd; color:#6a1b9a; font-weight:600; font-size:14px; padding:10px 12px; border-radius:8px; margin-bottom:12px; }
  .logout { color:#fff; background:none; border:none; width:auto; margin:0; padding:4px 8px; font-size:12px; text-decoration:underline; cursor:pointer; }
  .advisable { color:#8430ce; font-weight:600; }
  #reader { width:100%; border-radius:8px; overflow:hidden; margin-top:8px; }
  .line.flash { animation:flash 1s ease; }
  @keyframes flash { 0%,100% { background:transparent; } 30% { background:#f3e8fd; } }
</style>
</head>
<body>
<header>
  <span>🔄 Replenish Stock</span>
  <span class="who" id="whoami"></span>
</header>

<!-- LOGIN -->
<div class="step" id="login">
  <div class="card">
    <h2>Sign in</h2>
    <label>Staff ID</label>
    <input type="text" id="staffId" placeholder="STAFF001" autocomplete="off" autocapitalize="characters">
    <label>PIN</label>
    <input type="password" id="pin" placeholder="••••" inputmode="numeric" autocomplete="off">
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign in</button>
    <div class="error hidden" id="loginErr"></div>
  </div>
</div>

<!-- CHECKLIST -->
<div class="step hidden" id="checklist">
  <div class="van-banner" id="vanBanner"></div>
  <div class="card">
    <h2>Top up consumables</h2>
    <div class="muted">Enter how much of each item you're putting back into your van. This is logged as van usage since the last top-up.</div>
    <div id="reader" class="hidden"></div>
    <button class="btn-secondary" id="camBtn" onclick="toggleCamera()">📷 Scan to add</button>
    <label>Filter</label>
    <input type="text" id="itemFilter" placeholder="Search items…" oninput="renderItems()">
    <div class="error hidden" id="scanErr"></div>
    <div id="itemsBox" style="margin-top:6px;"><div class="muted">Loading…</div></div>
  </div>
  <button class="btn-primary" onclick="continueReplenish()">Continue</button>
  <div class="error hidden" id="checklistErr"></div>
  <button class="logout" style="color:var(--grey);" onclick="logout()">Sign out</button>
</div>

<!-- CONFIRM -->
<div class="step hidden" id="confirmview">
  <div class="card">
    <h2>Confirm replenishment</h2>
    <div id="confirmBox"></div>
  </div>
  <button class="btn-green" id="submitBtn" onclick="submitReplenish()">✓ Confirm — top these up</button>
  <button class="btn-plain" onclick="show('checklist')">Back</button>
  <div class="error hidden" id="submitErr"></div>
</div>

<!-- RESULT -->
<div class="step hidden" id="resultview">
  <div class="card">
    <div class="result-icon" id="resultIcon">✅</div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-detail" id="resultDetail"></div>
  </div>
  <button class="btn-primary" onclick="backToChecklist()">Replenish more</button>
</div>

<div class="step hidden" id="loading"><div class="card"><div class="spinner"></div><div class="muted" id="loadingMsg" style="text-align:center;">Working…</div></div></div>

<script>
var N8N_BASE = 'https://n8n-jpnq.srv1784919.hstgr.cloud';
var AUTH_KEY = 'ew_replenish_auth';
var auth = null;
try { auth = JSON.parse(localStorage.getItem(AUTH_KEY) || 'null'); } catch(e){}

var state = {
  items: [],       // from api: {sku, name, category, advisableQty}
  qtyBySku: {},     // sku -> qty entered
  seededSkus: {},   // sku -> true once its advisableQty has been prefilled (don't clobber user edits)
  lines: [],        // built at continue: {sku, name, qty}
  scanner: null, cameraOn: false
};

function show(id){ ['login','checklist','confirmview','resultview','loading'].forEach(function(s){ document.getElementById(s).classList.toggle('hidden', s!==id); }); }
function err(id,msg){ var e=document.getElementById(id); if(msg){ e.textContent=msg; e.classList.remove('hidden'); } else e.classList.add('hidden'); }
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function api(path, body){
  var payload = Object.assign({}, body || {});
  if(auth){ payload.staffId = auth.staffId; payload.token = auth.token; }
  var r = await fetch(N8N_BASE + path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  var t = await r.text();
  var j; try { j = JSON.parse(t); } catch(e){ j = { ok:false, error:'Bad response: '+t.slice(0,120) }; }
  if(j.error === 'auth'){ logout(); j.error = 'Session expired — please sign in again.'; }
  return j;
}

// ---------- login ----------
async function doLogin(){
  err('loginErr','');
  var sid = document.getElementById('staffId').value.trim();
  var pin = document.getElementById('pin').value.trim();
  if(!sid || !pin){ err('loginErr','Enter your Staff ID and PIN.'); return; }
  document.getElementById('loginBtn').disabled = true;
  show('loading');
  var res = await api('/webhook/api-stock-login', { loginStaffId: sid, pin: pin });
  document.getElementById('loginBtn').disabled = false;
  if(!res.ok){ show('login'); err('loginErr', res.error || 'Wrong Staff ID or PIN.'); return; }
  auth = { token: res.token, staffId: res.staffId, name: res.name, role: res.role, defaultVan: res.defaultVan || '' };
  localStorage.setItem(AUTH_KEY, JSON.stringify(auth));
  enterChecklist();
}

function logout(){ auth = null; localStorage.removeItem(AUTH_KEY); document.getElementById('whoami').textContent=''; show('login'); }

function enterChecklist(){
  document.getElementById('whoami').textContent = auth.name + ' (' + auth.staffId + ')';
  document.getElementById('vanBanner').textContent = auth.defaultVan ? ('Replenishing van: ' + auth.defaultVan) : 'No van is assigned to your account — contact admin before replenishing.';
  loadItems();
}

function backToChecklist(){ state.qtyBySku = {}; state.seededSkus = {}; loadItems(); }

// ---------- checklist ----------
async function loadItems(){
  show('checklist');
  err('checklistErr','');
  var box = document.getElementById('itemsBox');
  box.innerHTML = '<div class="muted">Loading…</div>';
  var res = await api('/webhook/api-replenish-items', { van: auth.defaultVan });
  if(!res.ok){ box.innerHTML = '<div class="error">'+escapeHtml(res.error||'Could not load items')+'</div>'; return; }
  state.items = res.items || [];
  state.items.forEach(function(it){
    if(!state.seededSkus[it.sku]){
      state.qtyBySku[it.sku] = it.advisableQty || 0;
      state.seededSkus[it.sku] = true;
    }
  });
  if(!state.items.length){ box.innerHTML = '<div class="muted">No Tier 3 consumable items are set up yet. Ask admin to tag items as Tier 3 in Airtable.</div>'; return; }
  renderItems();
}

function renderItems(){
  var box = document.getElementById('itemsBox'); box.innerHTML='';
  var filter = document.getElementById('itemFilter').value.trim().toLowerCase();
  var items = state.items.filter(function(it){
    if(!filter) return true;
    return (it.sku+' '+it.name).toLowerCase().indexOf(filter) !== -1;
  });
  if(!items.length){ box.innerHTML = '<div class="muted">No items match "'+escapeHtml(filter)+'".</div>'; return; }
  items.forEach(function(it){
    var qty = state.qtyBySku[it.sku] || 0;
    var div = document.createElement('div'); div.className='line'; div.id='row_'+it.sku;
    div.innerHTML =
      '<div class="line-info"><div class="line-name">'+escapeHtml(it.name)+'</div>' +
      '<div class="line-meta">'+escapeHtml(it.sku)+(it.category?' · '+escapeHtml(it.category):'')+
      (it.advisableQty ? ' · <span class="advisable">Advisable: '+it.advisableQty+'</span>' : '')+'</div></div>' +
      '<div class="qty-box"><button type="button" class="qty-step" onclick="stepQty(\''+it.sku+'\',-1)">−</button>' +
      '<input type="number" id="qty_'+it.sku+'" min="0" value="'+qty+'" inputmode="numeric" onchange="setQty(\''+it.sku+'\',this.value)">' +
      '<button type="button" class="qty-step" onclick="stepQty(\''+it.sku+'\',1)">+</button></div>';
    box.appendChild(div);
  });
}

function setQty(sku, val){
  var qty = Math.max(0, Math.min(999, parseInt(val,10)||0));
  state.qtyBySku[sku] = qty;
  var inp = document.getElementById('qty_'+sku);
  if(inp) inp.value = qty;
}
function stepQty(sku, delta){
  var qty = Math.max(0, Math.min(999, (state.qtyBySku[sku]||0) + delta));
  state.qtyBySku[sku] = qty;
  var inp = document.getElementById('qty_'+sku);
  if(inp) inp.value = qty;
}

// ---------- scan to add ----------
function toggleCamera(){
  if(state.cameraOn){ stopCamera(); return; }
  err('scanErr','');
  if(!window.isSecureContext){ err('scanErr','Camera needs an https:// page — use the filter/qty fields instead.'); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ err('scanErr','This browser blocks the camera — try Chrome or the qty fields instead.'); return; }
  var formats = [Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.CODE_39];
  document.getElementById('reader').classList.remove('hidden');
  state.scanner = new Html5Qrcode('reader', { formatsToSupport: formats });
  state.scanner.start({ facingMode:'environment' }, { fps:10, qrbox:{ width:280, height:120 } },
    function(text){ handleScannedSku(text); },
    function(){}
  ).then(function(){ state.cameraOn=true; document.getElementById('camBtn').textContent='⏹ Stop scanning'; })
   .catch(function(e){
     var msg = String(e);
     if(msg.indexOf('NotAllowedError') !== -1) msg = 'Camera permission denied — allow it in browser settings.';
     else if(msg.indexOf('SecurityError') !== -1) msg = 'Browser blocked the camera (security policy). Try Chrome.';
     else msg = 'Camera failed: '+msg;
     err('scanErr', msg+' You can still use the qty fields below.');
     document.getElementById('reader').classList.add('hidden');
   });
}
function stopCamera(){
  if(state.scanner && state.cameraOn){ state.scanner.stop().catch(function(){}); }
  state.cameraOn=false;
  document.getElementById('reader').classList.add('hidden');
  var b=document.getElementById('camBtn'); if(b) b.textContent='📷 Scan to add';
}
function handleScannedSku(raw){
  var sku = String(raw||'').trim().toUpperCase();
  if(!sku) return;
  var it = state.items.find(function(i){ return i.sku.toUpperCase() === sku; });
  if(!it){ err('scanErr','SKU "'+escapeHtml(sku)+'" is not a Tier 3 consumable.'); return; }
  err('scanErr','');
  stepQty(it.sku, 1);
  if(navigator.vibrate) navigator.vibrate(80);
  var row = document.getElementById('row_'+it.sku);
  if(row){
    row.scrollIntoView({ behavior:'smooth', block:'center' });
    row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash');
  }
}

function continueReplenish(){
  err('checklistErr','');
  stopCamera();
  if(!auth.defaultVan){ err('checklistErr','No van is assigned to your account — contact admin.'); return; }
  var lines = [];
  state.items.forEach(function(it){
    var qty = state.qtyBySku[it.sku] || 0;
    if(qty > 0) lines.push({ sku: it.sku, name: it.name, qty: qty });
  });
  if(!lines.length){ err('checklistErr','Enter a quantity for at least one item.'); return; }
  state.lines = lines;
  renderConfirm();
  show('confirmview');
}

function renderConfirm(){
  var box = document.getElementById('confirmBox'); box.innerHTML='';
  err('submitErr','');
  state.lines.forEach(function(l){
    var d = document.createElement('div'); d.className='line';
    d.innerHTML = '<div class="line-info"><div class="line-name">'+escapeHtml(l.name)+'</div>' +
      '<div class="line-meta">'+escapeHtml(l.sku)+' · qty '+l.qty+'</div></div>';
    box.appendChild(d);
  });
  var d2 = document.createElement('div'); d2.className='muted'; d2.style.marginTop='8px';
  d2.textContent = 'Van: ' + auth.defaultVan;
  box.appendChild(d2);
}

async function submitReplenish(){
  err('submitErr','');
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('loadingMsg').textContent = 'Saving — this can take a few seconds, please don\'t close the app…';
  show('loading');
  var res = await api('/webhook/api-replenish-submit', {
    van: auth.defaultVan,
    lines: state.lines.map(function(l){ return { sku:l.sku, qty:l.qty }; })
  });
  document.getElementById('submitBtn').disabled = false;
  if(res.ok){
    document.getElementById('resultIcon').textContent='✅';
    document.getElementById('resultTitle').textContent='Van topped up';
    document.getElementById('resultDetail').textContent=(res.linesProcessed||state.lines.length)+' item(s) replenished to '+(res.van||auth.defaultVan)+'.';
    state.qtyBySku = {};
    show('resultview');
  } else {
    show('confirmview');
    err('submitErr', res.error || 'Something went wrong — check with admin before retrying.');
  }
}

// ---------- boot ----------
document.getElementById('pin').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
if(auth && auth.token){ enterChecklist(); } else { show('login'); }
</script>
</body>
</html>
